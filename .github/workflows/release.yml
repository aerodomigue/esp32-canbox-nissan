name: Build and Draft Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      version: ${{ github.ref_name }}
      update-cache: true

  package:
    name: Package and Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-esp32-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Generate version.h
        run: |
          mkdir -p include
          echo "// Generated by GitHub Action" > include/version.h
          echo "#define APP_VERSION \"${{ github.ref_name }}\"" >> include/version.h
          echo "#define BUILD_DATE \"$(date +'%b %d %Y')\"" >> include/version.h

      - name: Build Firmware
        run: pio run -e esp32-c3-devkitm-1

      - name: Prepare configs
        run: |
          cd data
          zip -r ../vehicle_configs.zip .

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            .pio/build/esp32-c3-devkitm-1/firmware.ota
            .pio/build/esp32-c3-devkitm-1/all-firmware.bin
            vehicle_configs.zip
          body: |
            ## 📦 Installation & Upgrade
            - **First install?** Download **`all-firmware.bin`** and use [web.esphome.io](https://web.esphome.io/) or an Android OTG flasher.
            - **OTA Update?** Use **`firmware.ota`** inside the Android companion app.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
