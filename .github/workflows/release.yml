name: Build and Draft Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      version: ${{ github.ref_name }}
      upload-artifacts: true
      update-cache: true

  package:
    name: Package and Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts/

      - name: Prepare configs
        run: |
          cd data
          zip -r ../vehicle_configs.zip .

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/firmware.ota
            artifacts/all-firmware.bin
            vehicle_configs.zip
          body: |
            ## 📦 Installation & Upgrade
            - **First install?** Download **`all-firmware.bin`** and use [web.esphome.io](https://web.esphome.io/) or an Android OTG flasher.
            - **OTA Update?** Use **`firmware.ota`** inside the Android companion app.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
