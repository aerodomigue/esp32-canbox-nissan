name: CI

on:
  workflow_call:
    inputs:
      version:
        description: Firmware version string written into version.h
        type: string
        required: true
      upload-artifacts:
        description: Upload firmware artifacts after build (false for PRs)
        type: boolean
        default: false
      update-cache:
        description: Allow writing to the cache (false for PRs to avoid polluting prod cache)
        type: boolean
        default: false

jobs:
  test:
    name: Unit Tests (native)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore cache (read-only)
        if: ${{ !inputs.update-cache }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Cache (read-write)
        if: ${{ inputs.update-cache }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-native-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run Unit Tests
        run: pio test -e native

  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore cache (read-only)
        if: ${{ !inputs.update-cache }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-esp32-

      - name: Cache (read-write)
        if: ${{ inputs.update-cache }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-esp32-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-esp32-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Generate version.h
        run: |
          mkdir -p include
          echo "// Generated by GitHub Action" > include/version.h
          echo "#define APP_VERSION \"${{ inputs.version }}\"" >> include/version.h
          echo "#define BUILD_DATE \"$(date +'%b %d %Y')\"" >> include/version.h

      - name: Build Firmware
        run: pio run -e esp32-c3-devkitm-1

      - name: Upload firmware artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/esp32-c3-devkitm-1/firmware.ota
            .pio/build/esp32-c3-devkitm-1/all-firmware.bin
