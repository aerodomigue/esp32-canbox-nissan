; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino

; Vitesse du port série pour le débug
monitor_speed = 115200
; Filtres pour rendre le terminal propre (ajoute l'heure et des couleurs)
monitor_filters = time, colorize

; Bibliothèques
lib_deps =
    https://github.com/handmade0octopus/ESP32-TWAI-CAN.git
    bblanchon/ArduinoJson@^7

; Configuration spécifique au C3 (optimisation pour l'architecture RISC-V)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Filesystem configuration for vehicle config JSON files
board_build.filesystem = littlefs

; Scripts de build personnalisés
extra_scripts =
    pre:tools/git_version.py
    post:tools/merge_firmware.py

; =============================================================================
; Native test environment — runs unit tests on the host without an ESP32
; Usage: pio test -e native
; =============================================================================
[env:native]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -I test/mocks
    -std=c++17
    -Wno-format-security
build_src_filter =
    -<*>
    +<CanConfigProcessor.cpp>
test_filter = test_vehicle_params, test_ota_logic, test_can_decoding
lib_deps = bblanchon/ArduinoJson@^7
